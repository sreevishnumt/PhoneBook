<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phonebook</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
<div class="container mt-5 text-center">

    <h2>PHONEBOOK</h2>

    
    <input type="text" id="searchInput" placeholder="Search name or phone" class="form-control mb-3">
    <button onclick="searchUser()" class="btn btn-primary mb-3">Search</button>

    
    <input type="text" id="newName" placeholder="Name" class="form-control mb-2">
    <input type="text" id="newPhone" placeholder="Phone" class="form-control mb-2">
    <button onclick="addUser()" class="btn btn-success mb-3">Add Contact</button>

    
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="task-container"></tbody>
    </table>

</div>

<script src="index.js"></script>
</body>
</html>
